name: spell-check-test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  spell-check-test:
    name: spell-check-test
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v7.0.1
    - name: GitHub Spellcheck Action
      uses: rojopolis/spellcheck-github-actions@0.48.0
